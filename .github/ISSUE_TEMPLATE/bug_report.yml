name: Bug Report
description: Report a reproducible bug
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear and short bug summary
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps so maintainers can reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: mc_version
    attributes:
      label: Minecraft Version
      placeholder: "1.20.1"
    validations:
      required: true

  - type: dropdown
    id: loader
    attributes:
      label: Loader
      options:
        - Fabric
        - Forge
    validations:
      required: true

  - type: input
    id: mod_version
    attributes:
      label: CatSkinC-Remake Version
      placeholder: "2.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash Report
      description: Paste relevant part or attach a file
      render: text
    validations:
      required: false
