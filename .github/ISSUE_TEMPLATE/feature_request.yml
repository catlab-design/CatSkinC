name: Feature Request
description: Suggest an improvement or new feature
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this feature solve?
      placeholder: Describe current pain point
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What change do you want?
      placeholder: Describe expected behavior
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any alternatives considered
    validations:
      required: false
